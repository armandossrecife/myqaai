{% extends "base.html" %}

{% block content %}
<div class="container auth-container">
    <div class="auth-card text-center">
        <div class="mb-4">
            <i class="bi bi-box-arrow-in-right display-5 text-primary"></i>
            <h2 class="mt-2">Acesso ao Chat</h2>
        </div>
        <form id="login-form">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuário ou E-mail</label>
                <input type="text" class="form-control" id="username" required>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="login-spinner"></span>
                Login
            </button>
        </form>
        <div class="mt-4">
            <span class="text-secondary">Ainda não tem uma conta? <a href="/register" class="text-accent text-decoration-none">Crie uma agora</a></span>
        </div>
    </div>
</div>
{% endblock %}
