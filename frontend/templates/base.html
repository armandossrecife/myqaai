<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}QA AI Platform{% endblock %}</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet">
    
    <!-- Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Theme Config -->
    <script>
        (function() {
            const theme = localStorage.getItem('app_theme') || 'dark';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="bi bi-robot text-primary me-2"></i>QA AI Platform
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list text-light focus-ring"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto" id="nav-items">
                    <!-- Nav items will be populated by auth.js -->
                </ul>
            </div>
        </div>
    </nav>

    <div id="alert-container" class="position-fixed top-0 end-0 p-3" style="z-index: 1050; margin-top: 60px;">
        <!-- Alerts will be injected here -->
    </div>

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Settings Modal -->
    <div class="modal fade" id="settingsModal" tabindex="-1" aria-labelledby="settingsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content text-bg-dark" style="background-color: var(--bg-secondary) !important; color: var(--text-primary) !important;">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title" id="settingsModalLabel"><i class="bi bi-gear me-2"></i> Configurações</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="themeSelect" class="form-label">Tema da Aplicação</label>
                        <select class="form-select bg-dark text-light border-secondary" id="themeSelect">
                            <option value="dark">Modo Escuro (Padrão)</option>
                            <option value="light">Modo Claro</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="streamingToggle">
                            <label class="form-check-label" for="streamingToggle">Habilitar Streaming (SSE)</label>
                        </div>
                        <div class="form-text text-secondary" style="font-size: 0.85rem;">
                            Receba as respostas do modelo em tempo real, palavra por palavra.
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" id="btnSaveSettings">Salvar Configurações</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Configuration for JS -->
    <script>
        window.APP_CONFIG = {
            API_BASE_URL: "{{ api_base_url }}"
        };
    </script>
    
    <!-- Markdown Parser -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Core App JS -->
    <script src="{{ url_for('static', filename='js/utils.js') }}"></script>
    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
