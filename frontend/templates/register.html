{% extends "base.html" %}

{% block content %}
<div class="container auth-container">
    <div class="auth-card text-center">
        <div class="mb-4">
            <i class="bi bi-person-plus display-5 text-primary"></i>
            <h2 class="mt-2">Criar Conta</h2>
        </div>
        <form id="register-form">
            <div class="mb-3 text-start">
                <label for="username" class="form-label">Usuário</label>
                <input type="text" class="form-control" id="username" minlength="3" maxlength="50" required>
            </div>
            <div class="mb-3 text-start">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-4 text-start">
                <label for="password" class="form-label">Senha</label>
                <input type="password" class="form-control" id="password" minlength="8" required>
                <div class="form-text text-secondary">A senha deve ter pelo menos 8 caracteres.</div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
                <span class="spinner-border spinner-border-sm d-none me-2" role="status" aria-hidden="true" id="reg-spinner"></span>
                Registrar
            </button>
        </form>
        <div class="mt-4">
            <span class="text-secondary">Já tem uma conta? <a href="/login" class="text-accent text-decoration-none">Faça login</a></span>
        </div>
    </div>
</div>
{% endblock %}
